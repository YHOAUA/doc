<h2>文档页配色方向</h2>
<p class="subtitle">目标是让 <code>/docs/intro</code> 看起来更柔和、更耐看，而不是单纯变灰。</p>

<div class="cards">
  <div class="card" data-choice="mist" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#f4f1eb;border-radius:16px;padding:18px;min-height:220px;box-shadow:inset 0 0 0 1px rgba(125,107,86,.12);display:flex;flex-direction:column;gap:12px;">
        <div style="height:16px;width:42%;background:#8b6f52;border-radius:999px;opacity:.85;"></div>
        <div style="height:10px;width:88%;background:#b8ab9a;border-radius:999px;"></div>
        <div style="height:10px;width:76%;background:#c8beb1;border-radius:999px;"></div>
        <div style="height:10px;width:82%;background:#c8beb1;border-radius:999px;"></div>
        <div style="display:flex;gap:10px;margin-top:10px;">
          <div style="flex:1;height:70px;background:#ede6dc;border-radius:12px;"></div>
          <div style="flex:1;height:70px;background:#e5ddd0;border-radius:12px;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>暖雾纸张感</h3>
      <p>米白背景配低饱和棕灰文字，像柔和纸页，阅读压力最低。</p>
    </div>
  </div>

  <div class="card" data-choice="sage" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#eef3ef;border-radius:16px;padding:18px;min-height:220px;box-shadow:inset 0 0 0 1px rgba(76,103,88,.12);display:flex;flex-direction:column;gap:12px;">
        <div style="height:16px;width:42%;background:#5f7767;border-radius:999px;opacity:.9;"></div>
        <div style="height:10px;width:88%;background:#9aad9f;border-radius:999px;"></div>
        <div style="height:10px;width:76%;background:#b6c4b8;border-radius:999px;"></div>
        <div style="height:10px;width:82%;background:#b6c4b8;border-radius:999px;"></div>
        <div style="display:flex;gap:10px;margin-top:10px;">
          <div style="flex:1;height:70px;background:#dfe8e1;border-radius:12px;"></div>
          <div style="flex:1;height:70px;background:#d4e0d7;border-radius:12px;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>鼠尾草冷静感</h3>
      <p>偏绿色中性色，清爽安静，适合长时间盯着文档看。</p>
    </div>
  </div>

  <div class="card" data-choice="slate" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#f3f5f7;border-radius:16px;padding:18px;min-height:220px;box-shadow:inset 0 0 0 1px rgba(90,104,118,.12);display:flex;flex-direction:column;gap:12px;">
        <div style="height:16px;width:42%;background:#586779;border-radius:999px;opacity:.9;"></div>
        <div style="height:10px;width:88%;background:#98a7b6;border-radius:999px;"></div>
        <div style="height:10px;width:76%;background:#bac5cf;border-radius:999px;"></div>
        <div style="height:10px;width:82%;background:#bac5cf;border-radius:999px;"></div>
        <div style="display:flex;gap:10px;margin-top:10px;">
          <div style="flex:1;height:70px;background:#e6ebef;border-radius:12px;"></div>
          <div style="flex:1;height:70px;background:#dde4ea;border-radius:12px;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>雾蓝中性风</h3>
      <p>偏灰蓝的克制配色，保留技术文档感，但刺激性更低。</p>
    </div>
  </div>
</div>

<div class="section">
  <p class="subtitle">点选一个最接近你想要的方向。若你已经有更明确偏好，也可以直接在终端里补一句，比如“更暖一点”或“别发绿”。</p>
</div>
